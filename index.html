        const courses = {

            kingsbarns: { name: "Kingsbarns Golf Links", loc: "St Andrews, Scotland", games: "PC v CF & GC v SW", holes: 18, data: kingsbarnsData },

        function updateScore(courseId) {
            let scoreA = 0; let scoreB = 0; 
            const data = matchData[courseId] || {};
            Object.values(data).forEach(winner => {
                if(winner === 'A') scoreA++; if(winner === 'B') scoreB++;
            });
            const display = document.getElementById('display-score');
            if (scoreA === scoreB) display.innerText = "ALL SQUARE";
            else {
                const diff = Math.abs(scoreA - scoreB);
                const lead = scoreA > scoreB ? "CF X SW" : "GC X PC";
                display.innerText = `${lead} +${diff}`;
            }
        }

        function recordPoint(courseId, holeNum, value) {
            if(!matchData[courseId]) matchData[courseId] = {};
            matchData[courseId][holeNum] = value;
            updateScore(courseId);
        }

        function renderJuiceTable() {
            const table = document.getElementById('juice-table');
            let html = '';
            players.forEach(rowPlayer => {
                html += `<tr class="border-b border-stone-50"><td class="p-4 font-bold bg-stone-50 text-stone-500 border-r">${rowPlayer}</td>`;
                players.forEach(colPlayer => {
                    if (rowPlayer === colPlayer) html += `<td class="p-2 bg-stone-200/50"></td>`;
                    else {
                        const betId = `${colPlayer}-${rowPlayer}`;
                        if(isGlobalLedger) {
                            const stats = getGlobalBetStats(betId);
                            html += `<td class="p-2 text-center border-r"><div class="text-[10px] font-bold text-stone-400">TOTAL</div><div class="text-sm font-black text-stone-800">$${stats.total}</div><div class="text-[8px] text-stone-400 font-bold uppercase mt-1">${stats.wins} WINS</div></td>`;
                        } else {
                            const saved = (sideBets[currentCourseId] && sideBets[currentCourseId][betId]) || { amount: 0, won: false };
                            html += `<td class="p-2 text-center border-r">
                                <div class="flex items-center bg-stone-100 rounded mb-2 px-2">
                                    <span class="text-[10px] font-bold text-stone-400">$</span>
                                    <input type="number" value="${saved.amount || ''}" placeholder="0" class="w-full text-center border-none bg-transparent focus:ring-0 text-sm py-2 font-bold" onchange="updateBet('${betId}', this.value, null)">
                                </div>
                                <label class="flex items-center justify-center gap-1 cursor-pointer py-1 rounded bg-white border border-stone-100">
                                    <input type="checkbox" ${saved.won ? 'checked' : ''} onchange="updateBet('${betId}', null, this.checked)" class="accent-green-700 w-3 h-3">
                                    <span class="text-[8px] font-black text-stone-400">WON</span>
                                </label>
                            </td>`;
                        }
                    }
                });
                html += `</tr>`;
            });
            table.innerHTML = html;
            calcJuiceTotals();
        }

        function getGlobalBetStats(betId) {
            let total = 0; let wins = 0;
            Object.keys(sideBets).forEach(cId => {
                const bet = sideBets[cId][betId];
                if(bet && bet.won) { total += bet.amount; wins++; }
            });
            return { total, wins };
        }

        function updateBet(id, amt, won) {
            if(!sideBets[currentCourseId]) sideBets[currentCourseId] = {};
            if(!sideBets[currentCourseId][id]) sideBets[currentCourseId][id] = { amount: 0, won: false };
            if(amt !== null) sideBets[currentCourseId][id].amount = parseFloat(amt) || 0;
            if(won !== null) sideBets[currentCourseId][id].won = won;
            calcJuiceTotals();
        }

        function calcJuiceTotals() {
            let res = { CF: 0, SW: 0, GC: 0, PC: 0 };
            const targets = isGlobalLedger ? Object.keys(sideBets) : [currentCourseId];
            targets.forEach(cId => {
                Object.keys(sideBets[cId] || {}).forEach(id => {
                    const [winP, losP] = id.split('-');
                    const b = sideBets[cId][id];
                    if(b.won) { res[winP] += b.amount; res[losP] -= b.amount; }
                });
            });
            document.getElementById('juice-totals').innerHTML = players.map(p => `
                <div class="bg-stone-900 p-4 rounded-2xl text-center shadow-lg">
                    <span class="block text-[10px] text-stone-500 font-bold mb-1 uppercase">${p} LEDGER</span>
                    <span class="text-xl font-black ${res[p] >= 0 ? 'text-green-400' : 'text-red-400'}">${res[p] >= 0 ? '+$' : '-$'}${Math.abs(res[p])}</span>
                </div>
            `).join('');
            return res;
        }

        function viewLedger() {
            isGlobalLedger = true;
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('btn-ledger').classList.add('tab-active');
            document.getElementById('score-banner').classList.add('hidden');
            document.getElementById('export-container').classList.add('hidden');
            document.getElementById('juice-subtitle').innerText = "Tour Aggregate Ledger (All Courses)";
            document.getElementById('course-content').innerHTML = `

                    <div class="p-8 text-center bg-amber-50">

                        <p class="text-xs text-amber-700 font-bold uppercase tracking-[0.2em]">Summary of All Side Bets Across Tour</p>
                    </div>
                </div>`;
            renderJuiceTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchCourse(id) {
            isGlobalLedger = false; currentCourseId = id;
            const c = courses[id];
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`btn-${id}`).classList.add('tab-active');
            document.getElementById('score-banner').classList.remove('hidden');
            document.getElementById('export-container').classList.remove('hidden');
            document.getElementById('juice-subtitle').innerText = "Bets for this Course ($)";
            
            let html = '';
            c.data.forEach((h, idx) => {
                const i = idx + 1;
                const saved = (matchData[id] && matchData[id][i]) || "";
                html += `
                <div class="p-6 bg-white border-b border-stone-100 hover:bg-stone-50 transition-colors">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-4">

                            <div>

                                    <span class="text-xs font-bold text-stone-500">Par ${h.par} • ${h.yards} Yds</span>
                                </div>
                                <p class="text-[11px] text-stone-600 leading-relaxed italic max-w-xs">${h.tip}</p>
                            </div>
                        </div>
                        <select onchange="recordPoint('${id}', ${i}, this.value)" class="text-[10px] font-black border-2 border-stone-200 rounded-xl px-2 py-2 bg-white w-28 shadow-sm">
                            <option value="">WINNER?</option>
                            <option value="A" ${saved==='A'?'selected':''}>CF x SW</option>
                            <option value="B" ${saved==='B'?'selected':''}>GC x PC</option>
                            <option value="N" ${saved==='N'?'selected':''}>HALVED</option>
                        </select>
                    </div>
                </div>`;
            });

            document.getElementById('course-content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border border-stone-200">
                    <div class="p-6 bg-stone-50 border-b">
                        <h2 class="serif text-3xl text-stone-800 mb-1">${c.name}</h2>
                        <p class="text-xs text-stone-400 font-bold uppercase tracking-[0.2em] mb-4">${c.loc}</p>
                        <div class="bg-amber-100 text-amber-800 text-[10px] font-black px-3 py-1 rounded inline-block uppercase tracking-widest">Game: ${c.games}</div>
                    </div>
                    <div class="divide-y divide-stone-100">${html}</div>
                </div>`;
            updateScore(id); renderJuiceTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generateExport() {
            const c = courses[currentCourseId];
            const sc = document.getElementById('display-score').innerText;
            const jr = calcJuiceTotals();
            let txt = `⛳️ THIS IS 50 - RECAP\n--------------------------\n${c.name.toUpperCase()}\nMATCH: ${sc}\n\nROUND JUICE:\n`;
            players.forEach(p => txt += `${p}: ${jr[p] >= 0 ? '+$' : '-$'}${Math.abs(jr[p])}\n`);
            document.getElementById('export-text').value = txt;
            document.getElementById('export-modal').classList.remove('hidden');
        }

        function copyExport() {
            const t = document.getElementById('export-text'); t.select(); document.execCommand('copy');
            const s = document.getElementById('copy-status'); s.style.opacity = '1'; setTimeout(() => s.style.opacity = '0', 2000);
        }

        function closeModal() { document.getElementById('export-modal').classList.add('hidden'); }

        window.onload = () => { switchCourse('dunbar'); };
    </script>
