    <!-- Fonts -->

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair+Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .course-tab { transition: all 0.2s ease; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-active { 
            border-bottom: 3px solid #166534 !important; 
            color: #166534 !important; 
            font-weight: 700 !important; 
            background-color: #f0fdf4 !important; 
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        /* Itinerary specific styles */
        .itinerary-day-btn { transition: all 0.3s; flex-shrink: 0; }
        .day-active { background-color: #064e3b !important; color: white !important; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="text-stone-900">

    <!-- ITINERARY SECTION -->

    <script>

        const matchData = {};

        let isGlobalLedger = false;
        let currentItineraryDay = 0;

        // --- REAL DUNBAR DATA ---

            { par: 4, yards: 434, tip: "The grand finish. Wall OOB right. Aim for clubhouse chimney. Avoid right fairway bunker at all costs.", quote: "Hole 18: Home" }
        ];

        const courses = {
            dunbar: { name: "Dunbar Golf Club", loc: "East Lothian, Scotland", games: "Net Singles Aggie", holes: 18, data: dunbarHoles },
            craigielaw: { name: "Craigielaw Golf Club", loc: "Aberlady, Scotland", games: "GC v CF & SW v PC", holes: 18, data: Array(18).fill({par:4, yards:400, tip: "Strategic parkland links feel. Watch the wind.", quote: "Aberlady Coast"}) },
            kingsbarns: { name: "Kingsbarns Links", loc: "St Andrews, Scotland", games: "PC v CF & GC v SW", holes: 18, data: Array(18).fill({par:4, yards:400, tip: "Infinity green views. Massive undulations.", quote: "Fife Coastline"}) },
            carnoustie: { name: "Carnoustie Links", loc: "Angus, Scotland", games: "Low and Aggie", holes: 18, data: Array(18).fill({par:4, yards:400, tip: "Barry Burn is waiting. Don't look at the hotel clock.", quote: "Car-nasty"}) },
            portstewart: { name: "Portstewart (Strand)", loc: "N. Ireland", games: "Net Singles Aggie", holes: 18, data: Array(18).fill({par:4, yards:400, tip: "Greatest opening hole in golf. Dunes for days.", quote: "The Strand"}) },
            malone: { name: "Malone GC", loc: "Belfast, N. Ireland", games: "GC v CF & SW v PC", holes: 18, data: Array(18).fill({par:4, yards:400, tip: "Classic parkland precision required.", quote: "Drumbridge"}) },

        const itineraryData = [
            { day: "Saturday", date: "June 6", wakeUp: "Edinburgh", sleep: "Edinburgh", golf: [], schedule: [{ time: "All Day", event: "Recovery Day - Rose Street Pub Crawl" }], intel: { city: "Edinburgh", description: "Scotland's hilly capital, featuring a medieval Old Town and Georgian New Town.", hotspots: ["The Auld Hundred", "Element Bar", "Rose Street Brewery"] } },

            { day: "Monday", date: "June 8", wakeUp: "Edinburgh", sleep: "Aberlady", golf: [{ course: "Dunbar Golf Club", time: "10:09 AM", cost: "$230" }, { course: "Craigielaw Golf Club", time: "3:50 PM", cost: "$276" }], schedule: [{ time: "8:00 PM", event: "Dinner at Craigielaw Lodge" }], intel: { city: "Aberlady", description: "The heart of Scotland's East Lothian Golf Coast.", hotspots: ["The Courtyard"] } },
            { day: "Tuesday", date: "June 9", wakeUp: "Aberlady", sleep: "Carnoustie", golf: [{ course: "Kingsbarns Links", time: "11:20 AM", cost: "$919" }], schedule: [{ time: "7:00 PM", event: "Dinner at The Rookery" }], intel: { city: "St Andrews Area", description: "Breathtaking views and home to the game's history.", hotspots: ["The Rookery"] } },
            { day: "Wednesday", date: "June 10", wakeUp: "Carnoustie", sleep: "Montrose", golf: [{ course: "Carnoustie Links", time: "10:00 AM", cost: "$683" }], schedule: [{ time: "6:00 PM", event: "Dinner, Charcuterie & Gin" }], intel: { city: "Montrose", description: "Quiet coastal town with historic links.", hotspots: ["Links Hotel Gin Bar"] } },

            { day: "Friday", date: "June 12", wakeUp: "Dowans", sleep: "Belfast", golf: [], schedule: [{ time: "2:05 PM", event: "Flight to Belfast" }, { time: "8:00 PM", event: "Cathedral District Friday Night" }], intel: { city: "Belfast", description: "A city full of energy, murals, and legendary pubs.", hotspots: ["Duke of York", "Dirty Onion"] } },
            { day: "Saturday", date: "June 13", wakeUp: "Belfast", sleep: "Belfast", golf: [{ course: "Portstewart", time: "3:50 PM", cost: "$637" }], schedule: [{ time: "10:00 AM", event: "Giant's Causeway" }], intel: { city: "North Coast", description: "Dramatic cliffs and world-famous basalt columns.", hotspots: ["Bushmills Distillery"] } },
            { day: "Sunday", date: "June 14", wakeUp: "Belfast", sleep: "Dublin", golf: [{ course: "Malone Golf Club", time: "11:00 AM", cost: "$295" }], schedule: [{ time: "8:00 PM", event: "Sunday Sessions Temple Bar" }], intel: { city: "Dublin", description: "Ireland's fair city, famous for trad music and Guinness.", hotspots: ["The Oliver St. John Gogarty"] } },
            { day: "Monday", date: "June 15", wakeUp: "Dublin", sleep: "Dublin", golf: [{ course: "The Island", time: "9:30 AM", cost: "$543" }], schedule: [{ time: "3:00 PM", event: "Guinness Storehouse" }], intel: { city: "Dublin", description: "Bustling capital with deep literary and brewing history.", hotspots: ["Baggot Street Snugs"] } },
            { day: "Tuesday", date: "June 16", wakeUp: "Dublin", sleep: "Dublin", golf: [{ course: "Portmarnock Old", time: "9:50 AM", cost: "$775" }], schedule: [{ time: "8:00 PM", event: "Final Tour Dinner" }], intel: { city: "Dublin North", description: "Prestigious linksland overlooking Ireland's Eye.", hotspots: ["Merrion Square"] } },
            { day: "Wednesday", date: "June 17", wakeUp: "Dublin", sleep: "Toronto", golf: [], schedule: [{ time: "All Day", event: "Flight Home" }], intel: { city: "Home", description: "Safe travels back to Canada.", hotspots: [] } }
        ];

        // --- NAVIGATION LOGIC ---
        function showSection(sectionId) {
            document.getElementById('landing-menu').classList.add('hidden');
            document.getElementById('section-matches').classList.add('hidden');
            document.getElementById('section-itinerary').classList.add('hidden');
            
            document.getElementById('section-' + sectionId).classList.remove('hidden');
            
            if (sectionId === 'itinerary') renderItinerary();
            if (sectionId === 'matches') switchCourse('dunbar');
            window.scrollTo(0, 0);
        }

        function backToMenu() {
            document.getElementById('landing-menu').classList.remove('hidden');
            document.getElementById('section-matches').classList.add('hidden');
            document.getElementById('section-itinerary').classList.add('hidden');
        }

        // --- ITINERARY RENDERER ---
        function renderItinerary() {
            const nav = document.getElementById('itinerary-date-nav');
            const card = document.getElementById('itinerary-card-container');
            
            // Build Nav
            nav.innerHTML = itineraryData.map((d, i) => `
                <button onclick="setItineraryDay(${i})" class="itinerary-day-btn px-4 py-2 rounded-full text-xs font-bold uppercase ${currentItineraryDay === i ? 'day-active' : 'bg-white/20 text-white border border-white/20'}">
                    ${d.date}
                </button>
            `).join('');

            // Build Card
            const data = itineraryData[currentItineraryDay];
            card.innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-stone-200">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="serif text-3xl font-bold">${data.day}, ${data.date}</h3>
                        <div class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-[10px] font-bold uppercase tracking-widest">Day ${currentItineraryDay + 1}</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-stone-50 p-4 rounded-xl border border-stone-100">

                            <p class="font-bold text-stone-800">${data.wakeUp}</p>
                        </div>
                        <div class="bg-stone-50 p-4 rounded-xl border border-stone-100">
                            <p class="text-[10px] font-bold text-stone-400 uppercase mb-1">Sleep In</p>
                            <p class="font-bold text-stone-800">${data.sleep}</p>
                        </div>
                    </div>

                    ${data.golf.length > 0 ? `
                        <div class="mb-8">

                                <div class="bg-green-800 text-white rounded-2xl p-5 flex justify-between items-center mb-3 shadow-lg">
                                    <div>
                                        <p class="font-black text-lg">${g.course}</p>
                                        <p class="text-xs opacity-70">TEE TIME: ${g.time}</p>
                                    </div>
                                    <div class="bg-white/20 px-3 py-1 rounded-lg text-sm font-bold">${g.cost}</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="mb-8">
                        <h4 class="text-xs font-bold uppercase text-stone-400 mb-4 tracking-widest">Schedule</h4>
                        <div class="space-y-4">
                            ${data.schedule.map(s => `
                                <div class="flex gap-4 border-l-2 border-green-50 pl-4">
                                    <span class="w-20 text-xs font-bold text-stone-500 pt-1">${s.time}</span>
                                    <p class="flex-1 text-sm font-medium text-stone-800">${s.event}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-amber-50 rounded-2xl p-6 border border-amber-100">
                        <h4 class="serif text-xl font-bold text-amber-900 mb-2">Local Intel: ${data.intel.city}</h4>
                        <p class="text-sm text-amber-800/80 leading-relaxed mb-4">${data.intel.description}</p>
                        <div class="flex flex-wrap gap-2">
                            ${data.intel.hotspots.map(h => `<span class="bg-white text-amber-900 px-3 py-1 rounded-full text-[10px] font-bold border border-amber-200 shadow-sm">📍 ${h}</span>`).join('')}

                    </div>

            `;

        function setItineraryDay(idx) {
            currentItineraryDay = idx;
            renderItinerary();
        }

        // --- GOLF MATCHES LOGIC ---
        function updateScore(courseId) {
            let scoreA = 0, scoreB = 0; 
            const data = matchData[courseId] || {};
            Object.values(data).forEach(winner => { if(winner === 'A') scoreA++; if(winner === 'B') scoreB++; });
            const display = document.getElementById('display-score');
            if (scoreA === scoreB) display.innerText = "ALL SQUARE";
            else {
                const diff = Math.abs(scoreA - scoreB);
                const lead = scoreA > scoreB ? "CF X SW" : "GC X PC";
                display.innerText = `${lead} +${diff}`;
            }
        }

        function recordPoint(courseId, holeNum, value) {
            if(!matchData[courseId]) matchData[courseId] = {};
            matchData[courseId][holeNum] = value;
            updateScore(courseId);
        }

        function renderJuiceTable() {
            const table = document.getElementById('juice-table');
            const targetId = isGlobalLedger ? 'global' : currentCourseId;
            let html = '';
            players.forEach(rowPlayer => {
                html += `<tr class="border-b border-stone-50"><td class="p-4 font-bold bg-stone-50 text-stone-500 border-r border-stone-100">${rowPlayer}</td>`;
                players.forEach(colPlayer => {
                    if (rowPlayer === colPlayer) html += `<td class="p-2 bg-stone-200/50"></td>`;
                    else {
                        const betId = `${colPlayer}-${rowPlayer}`;
                        if(isGlobalLedger) {
                            const total = getGlobalBetTotal(betId);
                            html += `<td class="p-2 text-center border-r"><div class="text-[10px] font-bold text-stone-400">TOTAL</div><div class="text-sm font-black">$${total}</div></td>`;
                        } else {
                            const saved = (sideBets[targetId] && sideBets[targetId][betId]) || { amount: 0, won: false };
                            html += `<td class="p-2 text-center border-r"><div class="flex items-center bg-stone-100 rounded mb-2 px-2"><span class="text-[10px] font-bold text-stone-400">$</span><input type="number" value="${saved.amount || ''}" class="w-full text-center bg-transparent text-sm py-2 font-bold focus:outline-none" onchange="updateBet('${betId}', this.value, null)"></div><label class="flex items-center justify-center gap-1 cursor-pointer"><input type="checkbox" ${saved.won ? 'checked' : ''} onchange="updateBet('${betId}', null, this.checked)"><span class="text-[8px] font-black uppercase text-stone-400">WON</span></label></td>`;
                        }
                    }
                });
                html += `</tr>`;
            });
            table.innerHTML = html;
            calcJuiceTotals();
        }

        function getGlobalBetTotal(betId) {
            let total = 0;
            Object.keys(sideBets).forEach(cId => { if(sideBets[cId][betId] && sideBets[cId][betId].won) total += sideBets[cId][betId].amount; });
            return total;
        }

        function updateBet(id, amt, won) {
            if(!sideBets[currentCourseId]) sideBets[currentCourseId] = {};
            if(!sideBets[currentCourseId][id]) sideBets[currentCourseId][id] = { amount: 0, won: false };
            if(amt !== null) sideBets[currentCourseId][id].amount = parseFloat(amt) || 0;
            if(won !== null) sideBets[currentCourseId][id].won = won;
            calcJuiceTotals();
        }

        function calcJuiceTotals() {
            let res = { CF: 0, SW: 0, GC: 0, PC: 0 };
            const pool = isGlobalLedger ? Object.keys(sideBets) : [currentCourseId];
            pool.forEach(cId => {
                const round = sideBets[cId] || {};
                Object.keys(round).forEach(id => {
                    const [winner, loser] = id.split('-');
                    if(round[id].won) { res[winner] += round[id].amount; res[loser] -= round[id].amount; }
                });
            });
            document.getElementById('juice-totals').innerHTML = players.map(p => `<div class="bg-stone-900 p-4 rounded-2xl text-center shadow-lg"><span class="block text-[10px] text-stone-500 font-bold mb-1 uppercase tracking-tighter">${p}</span><span class="text-xl font-black ${res[p] >= 0 ? 'text-green-400' : 'text-red-400'}">${res[p] >= 0 ? '+$' : '-$'}${Math.abs(res[p])}</span></div>`).join('');
            return res;
        }

        function viewLedger() {
            isGlobalLedger = true;
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`btn-ledger`).classList.add('tab-active');
            document.getElementById('score-banner').classList.add('hidden');
            document.getElementById('juice-subtitle').innerText = "Tour Aggregate Ledger (All Courses)";
            document.getElementById('course-content').innerHTML = `<div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border-2 border-amber-400"><div class="p-10 text-center bg-amber-50"><h2 class="serif text-4xl text-amber-900 mb-2 font-bold italic">Tour Total Ledger</h2><p class="text-xs text-amber-700 font-bold uppercase tracking-[0.2em]">Live Standings Across All Matches</p></div></div>`;
            renderJuiceTable();
        }

        function switchCourse(id) {
            isGlobalLedger = false;
            currentCourseId = id;
            const course = courses[id];
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`btn-${id}`).classList.add('tab-active');
            document.getElementById('score-banner').classList.remove('hidden');
            document.getElementById('juice-subtitle').innerText = "Round Juice ($)";
            
            let html = '';
            course.data.forEach((h, idx) => {
                const i = idx + 1;
                const saved = (matchData[id] && matchData[id][i]) || "";
                html += `
                    <div class="p-6 bg-white border-b flex justify-between items-center hover:bg-stone-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-stone-300 text-4xl italic">#${i}</span>
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="text-xs font-black uppercase text-stone-800 tracking-tighter">Par ${h.par} • ${h.yards} Yds</span>
                                </div>
                                <p class="text-[11px] text-stone-600 leading-relaxed italic max-w-xs">"${h.tip}"</p>
                            </div>
                        </div>
                        <select onchange="recordPoint('${id}', ${i}, this.value)" class="text-[10px] font-black border-2 border-stone-200 rounded-xl px-2 py-2 w-28 bg-white focus:outline-none">
                            <option value="">WINNER?</option>
                            <option value="A" ${saved==='A'?'selected':''}>CF x SW</option>
                            <option value="B" ${saved==='B'?'selected':''}>GC x PC</option>
                            <option value="N" ${saved==='N'?'selected':''}>HALVED</option>
                        </select>
                    </div>`;
            });
            
            document.getElementById('course-content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border border-stone-200">
                    <div class="p-6 bg-stone-50 border-b">
                        <h2 class="serif text-3xl text-stone-800 mb-1">${course.name}</h2>
                        <p class="text-xs text-stone-400 font-bold uppercase tracking-[0.2em]">Game: ${course.games}</p>
                    </div>
                    <div class="divide-y divide-stone-100">${html}</div>
                </div>
            `;
            updateScore(id);
            renderJuiceTable();
            window.scrollTo(0, 0);
        }

        function generateExport() {
            const course = courses[currentCourseId];
            const scoreBanner = document.getElementById('display-score').innerText;
            const res = calcJuiceTotals();
            let text = `⛳️ THIS IS 50 - RECAP\n${course.name.toUpperCase()}\nMATCH: ${scoreBanner}\n\nROUND JUICE:\n`;
            players.forEach(p => { text += `${p}: ${res[p] >= 0 ? '+$' : '-$'}${Math.abs(res[p])}\n`; });
            document.getElementById('export-text').value = text;
            document.getElementById('export-modal').classList.remove('hidden');
        }

        function copyExport() {
            const text = document.getElementById('export-text'); text.select(); document.execCommand('copy');
            document.getElementById('copy-status').style.opacity = '1';
            setTimeout(() => { document.getElementById('copy-status').style.opacity = '0'; }, 2000);
        }

        function closeModal() { document.getElementById('export-modal').classList.add('hidden'); }

        window.onload = () => { renderItinerary(); };
    </script>
</body>
</html>
