<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This is 50. A Yardage Book for the Boys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; -webkit-tap-highlight-color: transparent; }
        .serif { font-family: 'Playfair+Display', serif; }
        
        .course-tab { transition: all 0.2s ease; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-active { 
            border-bottom: 3px solid #166534 !important; 
            color: #166534 !important; 
            font-weight: 700 !important; 
            background-color: #f0fdf4 !important; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }
    </style>
</head>
<body class="text-stone-900 pb-20">

    <!-- Header -->
    <header class="bg-stone-900 text-white py-10 px-6 text-center shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="serif text-4xl md:text-5xl mb-2 italic">This is 50.</h1>
            <p class="text-stone-400 tracking-[0.2em] uppercase text-[10px] font-bold">The Scotland & Ireland Elite Tour Ledger</p>
        </div>
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/grass.png')]"></div>
    </header>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white border-b border-stone-200 shadow-sm">
        <div class="max-w-7xl mx-auto flex overflow-x-auto no-scrollbar px-4" id="nav-tabs">
            <button onclick="viewLedger()" id="btn-ledger" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter text-amber-600 bg-amber-50/50">🧃 Juice Ledger</button>
            <button onclick="switchCourse('dunbar')" id="btn-dunbar" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Dunbar</button>
            <button onclick="switchCourse('craigielaw')" id="btn-craigielaw" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Craigielaw</button>
            <button onclick="switchCourse('kingsbarns')" id="btn-kingsbarns" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Kingsbarns</button>
            <button onclick="switchCourse('carnoustie')" id="btn-carnoustie" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Carnoustie</button>
            <button onclick="switchCourse('portstewart')" id="btn-portstewart" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Portstewart</button>
            <button onclick="switchCourse('malone')" id="btn-malone" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Malone</button>
            <button onclick="switchCourse('island')" id="btn-island" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">The Island</button>
            <button onclick="switchCourse('portmarnock')" id="btn-portmarnock" class="course-tab whitespace-nowrap px-6 py-4 text-xs font-bold uppercase tracking-tighter">Portmarnock</button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8">
        <!-- Live Match Score Display -->
        <div id="score-banner" class="mb-6 text-center bg-green-900 text-white py-5 rounded-2xl shadow-xl border-2 border-green-700">
            <span class="text-[10px] uppercase tracking-[0.2em] block opacity-70 mb-1 font-bold">Match Status</span>
            <span id="display-score" class="text-3xl font-black italic serif tracking-tight">ALL SQUARE</span>
        </div>

        <!-- Course Details & Hole Selection -->
        <div id="course-content"></div>

        <!-- The Juice Section (Round Specific) -->
        <section id="juice-section" class="mt-8 bg-white rounded-3xl shadow-xl border border-amber-200 overflow-hidden">
            <div class="bg-amber-50 p-6 border-b border-amber-100 flex items-center gap-4">
                <span class="text-4xl">🧃</span>
                <div>
                    <h3 class="serif text-2xl text-amber-900 leading-none mb-1">Round Juice</h3>
                    <p id="juice-subtitle" class="text-amber-700 text-[10px] font-bold uppercase tracking-widest">Bets for this Course ($)</p>
                </div>
            </div>
            <div class="p-4 overflow-x-auto">
                <table class="w-full text-xs border-collapse">
                    <thead>
                        <tr class="text-stone-400 border-b">
                            <th class="p-3 w-16"></th>
                            <th class="p-3 text-center bg-stone-50">CF</th>
                            <th class="p-3 text-center bg-stone-50">SW</th>
                            <th class="p-3 text-center bg-stone-50">GC</th>
                            <th class="p-3 text-center bg-stone-50">PC</th>
                        </tr>
                    </thead>
                    <tbody id="juice-table"></tbody>
                </table>
                
                <div class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-3" id="juice-totals"></div>
            </div>
        </section>

        <!-- Export Action -->
        <div id="export-container" class="mt-8">
            <button onclick="generateExport()" class="w-full bg-stone-900 text-white py-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl flex items-center justify-center gap-3 hover:bg-stone-800 active:scale-[0.98] transition-all">
                <span>📤 Copy Daily Recap</span>
            </button>
        </div>
    </main>

    <!-- Export Modal -->
    <div id="export-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b flex justify-between items-center bg-stone-50">
                <h3 class="serif text-xl">Daily Recap</h3>
                <button onclick="closeModal()" class="text-stone-400 text-2xl">✕</button>
            </div>
            <div class="p-6">
                <textarea id="export-text" class="w-full h-56 p-4 font-mono text-sm bg-stone-900 text-green-400 border rounded-xl mb-4 resize-none leading-relaxed" readonly></textarea>
                <button onclick="copyExport()" class="w-full bg-green-800 text-white py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-green-700 transition-colors">
                    Copy to Clipboard
                </button>
                <p id="copy-status" class="text-center text-xs text-green-600 font-bold mt-3 opacity-0 transition-opacity">COPIED!</p>
            </div>
        </div>
    </div>

    <script>
        const players = ["CF", "SW", "GC", "PC"];
        const matchData = {}; 
        const sideBets = {}; // Structure: sideBets[courseId][betKey] = { amount, won }
        let currentCourseId = 'dunbar';
        let isGlobalLedger = false;

        const getHoleDetails = (courseName) => {
            const data = [];
            for(let i=1; i<=18; i++) {
                data.push({
                    par: (i===3 || i===12 || i===17) ? 3 : (i===5 || i===15 || i===2 ? 5 : 4),
                    yards: 350 + (Math.floor(Math.random() * 200)),
                    tip: "Aim for the " + (i%2===0 ? "left" : "right") + " side of the fairway.",
                    quote: i === 1 ? "The first tee is where hope is still alive." : (i === 18 ? "The hardest walk in golf." : "This hole has ruined better men.")
                });
            }
            return data;
        };

        const courses = {
            dunbar: { name: "Dunbar Golf Club", loc: "East Lothian, Scotland", games: "Net Singles Aggie / Net Singles Aggie", holes: 18, data: getHoleDetails("Dunbar") },
            craigielaw: { name: "Craigielaw Golf Club", loc: "Aberlady, Scotland", games: "GC v CF & SW v PC / PC v CF & GC v SW", holes: 18, data: getHoleDetails("Craigielaw") },
            kingsbarns: { name: "Kingsbarns Golf Links", loc: "St Andrews, Scotland", games: "PC v CF & GC v SW / GC v CF & SW v PC", holes: 18, data: getHoleDetails("Kingsbarns") },
            carnoustie: { name: "Carnoustie Championship", loc: "Angus, Scotland", games: "Low and Aggie / Low and Aggie", holes: 18, data: getHoleDetails("Carnoustie") },
            portstewart: { name: "Portstewart (Strand)", loc: "N. Ireland", games: "Net Singles Aggie / Net Singles Aggie", holes: 18, data: getHoleDetails("Portstewart") },
            malone: { name: "Malone Golf Club", loc: "Belfast, N. Ireland", games: "GC v CF & SW v PC / PC v CF & GC v SW", holes: 18, data: getHoleDetails("Malone") },
            island: { name: "The Island Golf Club", loc: "Donabate, Ireland", games: "PC v CF & GC v SW / GC v CF & SW v PC", holes: 18, data: getHoleDetails("The Island") },
            portmarnock: { name: "Portmarnock Old Course", loc: "Dublin, Ireland", games: "Low and Aggie / Low and Aggie", holes: 18, data: getHoleDetails("Portmarnock") }
        };

        function updateScore(courseId) {
            let scoreA = 0; 
            let scoreB = 0; 
            const data = matchData[courseId] || {};
            Object.values(data).forEach(winner => {
                if(winner === 'A') scoreA++;
                if(winner === 'B') scoreB++;
            });
            const display = document.getElementById('display-score');
            if (scoreA === scoreB) display.innerText = "ALL SQUARE";
            else {
                const diff = Math.abs(scoreA - scoreB);
                const lead = scoreA > scoreB ? "CF X SW" : "GC X PC";
                display.innerText = `${lead} +${diff}`;
            }
        }

        function recordPoint(courseId, holeNum, value) {
            if(!matchData[courseId]) matchData[courseId] = {};
            matchData[courseId][holeNum] = value;
            updateScore(courseId);
        }

        function renderJuiceTable() {
            const table = document.getElementById('juice-table');
            const targetId = isGlobalLedger ? 'global' : currentCourseId;
            let html = '';
            
            players.forEach(rowPlayer => {
                html += `<tr class="border-b border-stone-50">
                    <td class="p-4 font-bold bg-stone-50 text-stone-500 border-r border-stone-100">${rowPlayer}</td>`;
                players.forEach(colPlayer => {
                    if (rowPlayer === colPlayer) html += `<td class="p-2 bg-stone-200/50"></td>`;
                    else {
                        const betId = `${colPlayer}-${rowPlayer}`;
                        // If global, we just show sums (read only)
                        if(isGlobalLedger) {
                            const stats = getGlobalBetStats(betId);
                            html += `
                            <td class="p-2 text-center border-r border-stone-50">
                                <div class="text-[10px] font-bold text-stone-400 mb-1">TOTAL</div>
                                <div class="text-sm font-black text-stone-800">$${stats.total}</div>
                                <div class="text-[8px] text-stone-400 font-bold uppercase mt-1">${stats.wins} WINS</div>
                            </td>`;
                        } else {
                            const saved = (sideBets[targetId] && sideBets[targetId][betId]) || { amount: 0, won: false };
                            html += `
                            <td class="p-2 text-center border-r border-stone-50">
                                <div class="flex items-center bg-stone-100 rounded mb-2 px-2">
                                    <span class="text-[10px] font-bold text-stone-400">$</span>
                                    <input type="number" value="${saved.amount || ''}" placeholder="0" class="w-full text-center border-none bg-transparent focus:ring-0 rounded text-sm py-2 font-bold" 
                                        onchange="updateBet('${betId}', this.value, null)">
                                </div>
                                <label class="flex items-center justify-center gap-1 cursor-pointer py-1 px-1 rounded bg-white border border-stone-100 active:bg-green-50">
                                    <input type="checkbox" ${saved.won ? 'checked' : ''} onchange="updateBet('${betId}', null, this.checked)" class="accent-green-700 w-3 h-3">
                                    <span class="text-[8px] font-black uppercase text-stone-400">WON</span>
                                </label>
                            </td>`;
                        }
                    }
                });
                html += `</tr>`;
            });
            table.innerHTML = html;
            calcJuiceTotals();
        }

        function getGlobalBetStats(betId) {
            let total = 0;
            let wins = 0;
            Object.keys(sideBets).forEach(courseId => {
                const bet = sideBets[courseId][betId];
                if(bet && bet.won) {
                    total += bet.amount;
                    wins++;
                }
            });
            return { total, wins };
        }

        function updateBet(id, amt, won) {
            if(!sideBets[currentCourseId]) sideBets[currentCourseId] = {};
            if(!sideBets[currentCourseId][id]) sideBets[currentCourseId][id] = { amount: 0, won: false };
            
            if(amt !== null) sideBets[currentCourseId][id].amount = parseFloat(amt) || 0;
            if(won !== null) sideBets[currentCourseId][id].won = won;
            
            calcJuiceTotals();
        }

        function calcJuiceTotals() {
            let results = { CF: 0, SW: 0, GC: 0, PC: 0 };
            
            if(isGlobalLedger) {
                // Sum all courses
                Object.keys(sideBets).forEach(courseId => {
                    Object.keys(sideBets[courseId]).forEach(betKey => {
                        const [winner, loser] = betKey.split('-');
                        const bet = sideBets[courseId][betKey];
                        if(bet.won) {
                            results[winner] += bet.amount;
                            results[loser] -= bet.amount;
                        }
                    });
                });
            } else {
                // Just current round
                const roundBets = sideBets[currentCourseId] || {};
                Object.keys(roundBets).forEach(id => {
                    const [winner, loser] = id.split('-');
                    if(roundBets[id].won) {
                        results[winner] += roundBets[id].amount;
                        results[loser] -= roundBets[id].amount;
                    }
                });
            }

            document.getElementById('juice-totals').innerHTML = players.map(p => `
                <div class="bg-stone-900 p-4 rounded-2xl text-center shadow-lg">
                    <span class="block text-[10px] text-stone-500 font-bold mb-1 uppercase tracking-tighter">${p} LEDGER</span>
                    <span class="text-xl font-black ${results[p] >= 0 ? 'text-green-400' : 'text-red-400'}">
                        ${results[p] >= 0 ? '+$' : '-$'}${Math.abs(results[p])}
                    </span>
                </div>
            `).join('');
            return results;
        }

        function viewLedger() {
            isGlobalLedger = true;
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`btn-ledger`).classList.add('tab-active');
            
            document.getElementById('score-banner').classList.add('hidden');
            document.getElementById('export-container').classList.add('hidden');
            document.getElementById('juice-subtitle').innerText = "Tour Aggregate Ledger (All Courses)";
            document.querySelector('#juice-section h3').innerText = "Global Ledger";
            
            document.getElementById('course-content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border-2 border-amber-400">
                    <div class="p-8 text-center bg-amber-50">
                         <h2 class="serif text-4xl text-amber-900 mb-2">The Big Book of Juice</h2>
                         <p class="text-xs text-amber-700 font-bold uppercase tracking-[0.2em]">Summary of All Matches & Side Bets</p>
                    </div>
                </div>
            `;
            renderJuiceTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchCourse(id) {
            isGlobalLedger = false;
            currentCourseId = id;
            const course = courses[id];
            
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(`btn-${id}`).classList.add('tab-active');
            
            document.getElementById('score-banner').classList.remove('hidden');
            document.getElementById('export-container').classList.remove('hidden');
            document.getElementById('juice-subtitle').innerText = "Bets for this Course ($)";
            document.querySelector('#juice-section h3').innerText = "Round Juice";

            let holeHtml = '';
            course.data.forEach((h, idx) => {
                const i = idx + 1;
                const saved = (matchData[id] && matchData[id][i]) || "";
                holeHtml += `
                <div class="p-6 bg-white border-b border-stone-100 hover:bg-stone-50 transition-colors">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-stone-300 text-4xl italic">#${i}</span>
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="text-xs font-black uppercase tracking-widest text-stone-800">Par ${h.par}</span>
                                    <span class="w-1 h-1 bg-stone-300 rounded-full"></span>
                                    <span class="text-xs font-bold text-stone-500">${h.yards} Yds</span>
                                </div>
                                <p class="text-[11px] text-stone-600 leading-relaxed italic max-w-xs">"${h.quote}"</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                             <select onchange="recordPoint('${id}', ${i}, this.value)" class="text-[10px] font-black border-2 border-stone-200 rounded-xl px-2 py-2 bg-white focus:border-green-800 outline-none w-28 shadow-sm">
                                <option value="">WINNER?</option>
                                <option value="A" ${saved==='A'?'selected':''}>CF x SW</option>
                                <option value="B" ${saved==='B'?'selected':''}>GC x PC</option>
                                <option value="N" ${saved==='N'?'selected':''}>HALVED</option>
                            </select>
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('course-content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border border-stone-200">
                    <div class="p-6 bg-stone-50 border-b">
                        <h2 class="serif text-3xl text-stone-800 mb-1">${course.name}</h2>
                        <p class="text-xs text-stone-400 font-bold uppercase tracking-[0.2em] mb-4">${course.loc}</p>
                        <div class="bg-amber-100 text-amber-800 text-[10px] font-black px-3 py-1 rounded inline-block uppercase tracking-widest">
                            Game: ${course.games}
                        </div>
                    </div>
                    <div class="divide-y divide-stone-100">${holeHtml}</div>
                </div>
            `;
            updateScore(id);
            renderJuiceTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generateExport() {
            const course = courses[currentCourseId];
            const scoreBanner = document.getElementById('display-score').innerText;
            const juiceResults = calcJuiceTotals();
            let text = `⛳️ THIS IS 50 - RECAP\n`;
            text += `--------------------------\n`;
            text += `${course.name.toUpperCase()}\n`;
            text += `MATCH: ${scoreBanner}\n\n`;
            text += `ROUND JUICE:\n`;
            players.forEach(p => {
                const val = juiceResults[p];
                text += `${p}: ${val >= 0 ? '+$' : '-$'}${Math.abs(val)}\n`;
            });
            document.getElementById('export-text').value = text;
            document.getElementById('export-modal').classList.remove('hidden');
        }

        function copyExport() {
            const text = document.getElementById('export-text');
            text.select();
            document.execCommand('copy');
            const status = document.getElementById('copy-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 2000);
        }

        function closeModal() { document.getElementById('export-modal').classList.add('hidden'); }

        window.onload = () => { switchCourse('dunbar'); };
    </script>
</body>
</html>
