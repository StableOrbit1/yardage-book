                        <div class="mb-10 px-2">
                            <h3 class="serif text-xl mb-6 text-stone-600 flex items-center">
                                <svg class="w-5 h-5 mr-2 text-green-700" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 112 0v1a1 1 0 11-2 0zM13.536 13.536a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 011.414-1.414l.707.707zM16 18a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1z"/></svg>
                                General Course Strategy
                            </h3>
                            <div class="grid md:grid-cols-3 gap-4">
                                ${course.tips.map(tip => `
                                    <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200 text-sm text-stone-600 font-medium">
                                        ${tip}
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="space-y-4 px-2">
                            <h3 class="serif text-xl mb-4 text-stone-600">Full 18 Hole Breakdown</h3>
                            ${course.holes.map(hole => `
                                <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                                    <div class="flex items-center justify-between bg-stone-900 text-white p-3 px-5">
                                        <div class="flex items-center gap-4">
                                            <span class="text-xl md:text-2xl font-black">#${hole.h}</span>
                                            <span class="text-[10px] uppercase tracking-widest opacity-70 font-bold">Par ${hole.p}</span>
                                        </div>
                                        <span class="font-mono font-bold text-sm md:text-base">${hole.y} Yards</span>
                                    </div>
                                    <div class="p-4 bg-white">
                                        <p class="text-stone-700 italic leading-relaxed text-sm md:text-base">
                                            <span class="text-green-700 font-bold not-italic text-[10px] uppercase block mb-1">Caddie Strategy:</span>
                                            "${hole.t}"
                                        </p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('course-content').innerHTML = content;
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchCourse('dunbar');
        });
    </script>
</body>
</html>
