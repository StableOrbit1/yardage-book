        // --- NAVIGATION ENGINE ---
        function navigateTo(id) {
            document.getElementById('section-menu').classList.add('hidden');
            document.getElementById('section-matches').classList.add('hidden');
            document.getElementById('section-itinerary').classList.add('hidden');
            
            const active = document.getElementById('section-' + id);
            active.classList.remove('hidden');
            active.classList.add('fade-in');

            if (id === 'itinerary') renderItinerary();
            if (id === 'matches') switchCourse(currentCourseId);
            window.scrollTo(0, 0);
        }

        // --- MATCHES ENGINE ---
        function switchCourse(id) {
            isGlobalLedger = false;
            currentCourseId = id;
            const course = courses[id];
            
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('btn-' + id).classList.add('tab-active');
            
            document.getElementById('score-banner').classList.remove('hidden');
            document.getElementById('juice-subtitle').innerText = "Round Juice ($)";
            
            let html = '';
            course.data.forEach((h, idx) => {
                const i = idx + 1;
                const saved = (matchData[id] && matchData[id][i]) || "";
                html += `
                    <div class="p-6 bg-white border-b flex justify-between items-center hover:bg-stone-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-stone-300 text-4xl italic">#${i}</span>
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="text-xs font-black uppercase text-stone-800 tracking-tighter">Par ${h.par} • ${h.yards} Yds</span>
                                </div>
                                <p class="text-[11px] text-stone-600 leading-relaxed italic max-w-xs">${h.name}: "${h.tip}"</p>
                            </div>
                        </div>
                        <select onchange="recordPoint('${id}', ${i}, this.value)" class="text-[10px] font-black border-2 border-stone-200 rounded-xl px-2 py-2 w-28 bg-white outline-none">
                            <option value="">WINNER?</option>
                            <option value="A" ${saved==='A'?'selected':''}>CF x SW</option>
                            <option value="B" ${saved==='B'?'selected':''}>GC x PC</option>
                            <option value="N" ${saved==='N'?'selected':''}>HALVED</option>
                        </select>
                    </div>`;
            });
            
            document.getElementById('course-content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border border-stone-200">
                    <div class="p-6 bg-stone-50 border-b">
                        <h2 class="serif text-3xl text-stone-800 mb-1">${course.name}</h2>
                        <p class="text-xs text-stone-400 font-bold uppercase tracking-[0.2em]">Game: ${course.games}</p>
                    </div>
                    <div class="divide-y divide-stone-100">${html}</div>
                </div>`;
            updateScore(id);
            renderJuiceTable();
        }

        function recordPoint(courseId, holeNum, value) {
            if(!matchData[courseId]) matchData[courseId] = {};
            matchData[courseId][holeNum] = value;
            updateScore(courseId);
        }

        function updateScore(courseId) {
            let scoreA = 0, scoreB = 0; 
            const data = matchData[courseId] || {};
            Object.values(data).forEach(v => { if(v === 'A') scoreA++; if(v === 'B') scoreB++; });
            const display = document.getElementById('display-score');
            if (scoreA === scoreB) display.innerText = "ALL SQUARE";
            else {
                const diff = Math.abs(scoreA - scoreB);
                display.innerText = (scoreA > scoreB ? "CF X SW" : "GC X PC") + " +" + diff;
            }
        }

                html += `<tr class="border-b border-stone-50"><td class="p-4 font-bold bg-stone-50 text-stone-500 border-r">${rowPlayer}</td>`;
                players.forEach(colPlayer => {
                    if (rowPlayer === colPlayer) html += `<td class="p-2 bg-stone-200/30"></td>`;
                    else {
                        const betId = `${colPlayer}-${rowPlayer}`;
                        if(isGlobalLedger) {
                            const total = getGlobalTotal(betId);
                            html += `<td class="p-2 text-center border-r"><div class="text-[10px] font-bold text-stone-400">TOTAL</div><div class="text-sm font-black text-stone-800">$${total}</div></td>`;
                        } else {
                            const saved = (sideBets[targetId] && sideBets[targetId][betId]) || { amount: 0, won: false };
                            html += `<td class="p-2 text-center border-r"><div class="flex items-center bg-stone-100 rounded mb-2 px-1"><span class="text-[10px] font-bold text-stone-400">$</span><input type="number" value="${saved.amount || ''}" class="w-full text-center bg-transparent text-sm py-2 font-bold focus:outline-none" onchange="updateBet('${betId}', this.value, null)"></div><label class="flex items-center justify-center gap-1 cursor-pointer"><input type="checkbox" ${saved.won ? 'checked' : ''} onchange="updateBet('${betId}', null, this.checked)"><span class="text-[8px] font-black uppercase text-stone-400">WON</span></label></td>`;
                        }
                    }
                });
                html += `</tr>`;
            });
            table.innerHTML = html;
            calcJuiceTotals();
        }

        function getGlobalTotal(betId) {
            let sum = 0;
            Object.keys(sideBets).forEach(c => { if(sideBets[c][betId] && sideBets[c][betId].won) sum += sideBets[c][betId].amount; });
            return sum;
        }

        function updateBet(id, amt, won) {
            if(!sideBets[currentCourseId]) sideBets[currentCourseId] = {};
            if(!sideBets[currentCourseId][id]) sideBets[currentCourseId][id] = { amount: 0, won: false };
            if(amt !== null) sideBets[currentCourseId][id].amount = parseFloat(amt) || 0;
            if(won !== null) sideBets[currentCourseId][id].won = won;
            calcJuiceTotals();
        }

        function calcJuiceTotals() {
            let res = { CF: 0, SW: 0, GC: 0, PC: 0 };
            const pool = isGlobalLedger ? Object.keys(sideBets) : [currentCourseId];
            pool.forEach(c => {
                const round = sideBets[c] || {};
                Object.keys(round).forEach(id => {
                    const [winner, loser] = id.split('-');
                    if(round[id].won) { res[winner] += round[id].amount; res[loser] -= round[id].amount; }
                });
            });
            document.getElementById('juice-totals').innerHTML = players.map(p => `<div class="bg-stone-900 p-4 rounded-2xl text-center shadow-lg"><span class="block text-[10px] text-stone-500 font-bold mb-1 uppercase tracking-tighter">${p}</span><span class="text-xl font-black ${res[p] >= 0 ? 'text-green-400' : 'text-red-400'}">${res[p] >= 0 ? '+$' : '-$'}${Math.abs(res[p])}</span></div>`).join('');
        }

        function viewLedger() {
            isGlobalLedger = true;
            document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('btn-ledger').classList.add('tab-active');
            document.getElementById('score-banner').classList.add('hidden');
            document.getElementById('juice-subtitle').innerText = "Tour Aggregate Ledger";
            document.getElementById('course-content').innerHTML = `<div class="bg-white rounded-3xl shadow-xl overflow-hidden mb-4 border-2 border-amber-400"><div class="p-10 text-center bg-amber-50"><h2 class="serif text-4xl text-amber-900 mb-2 font-bold italic">Tour Ledger</h2><p class="text-xs text-amber-700 font-bold uppercase tracking-[0.2em]">Combined Standings Across All Matches</p></div></div>`;
            renderJuiceTable();
        }

        // --- ITINERARY ENGINE ---
        function renderItinerary() {
            const nav = document.getElementById('itinerary-nav');
            const content = document.getElementById('itinerary-content');
            const d = itineraryData[activeDayIdx];

            nav.innerHTML = itineraryData.map((day, i) => `
                <button onclick="setDay(${i})" class="day-btn px-4 py-2 rounded-full text-[10px] font-bold uppercase border border-white/20 text-white ${activeDayIdx === i ? 'day-active' : 'bg-white/5'}">
                    ${day.date}
                </button>
            `).join('');

            content.innerHTML = `
                <div class="bg-white rounded-[2rem] shadow-2xl border border-stone-200 p-6 md:p-10 fade-in">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="serif text-4xl font-bold text-stone-900">${d.day}</h2>
                            <p class="text-green-700 font-bold uppercase tracking-widest text-xs">${d.date}</p>
                        </div>
                        <div class="bg-green-100 text-green-800 px-4 py-1 rounded-full text-[10px] font-black uppercase">Day ${activeDayIdx + 1}</div>
                    </div>

                    <!-- Daily Quote -->
                    <div class="mb-8 border-l-4 border-amber-400 pl-5 py-1">
                        <p class="serif text-xl italic text-stone-700 leading-snug mb-2">"${d.quote}"</p>
                        <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">— ${d.author}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-stone-50 p-4 rounded-2xl border border-stone-100">
                            <span class="block text-[9px] font-black text-stone-400 uppercase mb-1">Wake Up</span>
                            <span class="font-bold text-stone-800">${d.wake}</span>
                        </div>
                        <div class="bg-stone-50 p-4 rounded-2xl border border-stone-100">
                            <span class="block text-[9px] font-black text-stone-400 uppercase mb-1">Sleep In</span>
                            <span class="font-bold text-stone-800">${d.sleep}</span>
                        </div>
                    </div>

                    ${d.golf.length > 0 ? `
                        <div class="mb-8">
                            <h3 class="text-[10px] font-black uppercase text-stone-400 mb-4 tracking-[0.2em]">The Golf</h3>
                            ${d.golf.map(g => `
                                <div class="bg-green-900 text-white p-5 rounded-2xl flex justify-between items-center mb-3 shadow-lg">
                                    <div>
                                        <p class="font-black text-lg">${g.c}</p>
                                    </div>
                                    <div class="bg-white/10 px-4 py-2 rounded-lg text-xs font-black tracking-widest">
                                        ${g.t}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}

                    <div class="mb-8">
                        <h3 class="text-[10px] font-black uppercase text-stone-400 mb-4 tracking-[0.2em]">Schedule</h3>
                        <div class="space-y-4">
                            ${d.events.map(ev => `
                                <div class="flex gap-4 border-l-2 border-green-100 pl-4">
                                    <span class="w-16 flex-shrink-0 text-[10px] font-black text-stone-400 pt-1">${ev.t}</span>
                                    <p class="text-sm font-bold text-stone-800 leading-tight">${ev.e}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-amber-50 rounded-2xl p-6 border border-amber-100">
                        <h3 class="serif text-xl font-bold text-amber-900 mb-1">City Guide: ${d.city}</h3>
                        <p class="text-sm text-amber-800/80 leading-relaxed font-medium mb-4 pb-4 border-b border-amber-200/50">${d.cityDesc}</p>
                        
                        ${d.hotspots.length > 0 ? `
                            <h4 class="text-[10px] font-black uppercase text-amber-700/60 mb-2 tracking-[0.2em]">Notable Spots</h4>
                            <div class="flex flex-wrap gap-2">
                                ${d.hotspots.map(h => `<span class="bg-white text-amber-900 px-3 py-1.5 rounded-full text-[10px] font-black border border-amber-200 shadow-sm">📍 ${h}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>`;
        }

        function setDay(i) { activeDayIdx = i; renderItinerary(); }

        // --- UTILS ---
        function generateExport() {
            const course = courses[currentCourseId];
            const score = document.getElementById('display-score').innerText;
            const res = { CF: 0, SW: 0, GC: 0, PC: 0 };
            const round = sideBets[currentCourseId] || {};
            Object.keys(round).forEach(id => {
                const [w, l] = id.split('-');
                if(round[id].won) { res[w] += round[id].amount; res[l] -= round[id].amount; }
            });
            let text = `⛳️ TOUR RECAP: ${course.name}\nMATCH: ${score}\n\nROUND JUICE:\n`;
            players.forEach(p => { text += `${p}: ${res[p] >= 0 ? '+$' : '-$'}${Math.abs(res[p])}\n`; });
            document.getElementById('export-text').value = text;
            document.getElementById('export-modal').classList.remove('hidden');
        }

        function copyExport() {
            document.getElementById('export-text').select();
            document.execCommand('copy');
            document.getElementById('copy-status').style.opacity = '1';
            setTimeout(() => { document.getElementById('copy-status').style.opacity = '0'; }, 2000);
        }

        function closeModal() { document.getElementById('export-modal').classList.add('hidden'); }

        window.onload = () => { switchCourse('dunbar'); };
    </script>
</body>
</html>
